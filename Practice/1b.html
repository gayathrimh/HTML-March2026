<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .seg{
            width: 600px;
            height:100px;
            display: flex;
            justify-content: center;
        }
        .red{
            background-color: red;
        }
        .white{
            background-color: white;
        }
        .green{
            background-color:green;
        }
        .button1{
            width: 600px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="seg red"></div>
    <div class="seg white">
        <img src="ashokachakra.png" id="ashokaChakra1" alt="Ashoka Chakra">
    </div>
    <div class="seg green"></div>
    <div class="button1">
        <button id="id1">Play National Anthem</button>
        <audio src="National-Anthem-India.mp3" id="id2"></audio>
    </div>

    <script>
        let chakra1=document.getElementById("ashokaChakra1");
        let ashokaChakraState=true;

        chakra1.onclick=function(){
            if (ashokaChakraState==true){
                ashokaChakraState=false;
                chakra1.style.opacity="0";
            }else{
                ashokaChakraState=true;
                chakra1.style.opacity="1";
            }
        }
    </script>
</body>
</html>
