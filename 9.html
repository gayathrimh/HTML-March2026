<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette</title>
    <style>
        td{
            background-color: red;
            width:80px;
            height:40px;
        }
        table{
            margin-left:200px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
                <td style="background-color:rgb(255,0,0)"></td>
                <td style="background-color:rgb(235,0,0)"></td>
                <td style="background-color:rgb(215,0,0)"></td>
                <td style="background-color:rgb(195,0,0)"></td>
                <td style="background-color:rgb(175,0,0)"></td>
                <td style="background-color:rgb(155,0,0)"></td>
                <td style="background-color:rgb(135,0,0)"></td>
                <td style="background-color:rgb(115,0,0)"></td> 
        </tr>
        <tr>
            <td style="background-color: rgb(0,255,0);"></td>
            <td style="background-color: rgb(0,235,0);"></td>
            <td style="background-color: rgb(0,215,0);"></td>
            <td style="background-color: rgb(0,195,0);"></td>
            <td style="background-color: rgb(0,175,0);"></td>
            <td style="background-color: rgb(0,155,0);"></td>
            <td style="background-color: rgb(0,135,0);"></td>
            <td style="background-color: rgb(0,115,0);"></td>
        </tr>
        <tr>
            <td style="background-color: rgb(0,0,255);"></td>
            <td style="background-color: rgb(0,0,235);"></td>
            <td style="background-color: rgb(0,0,215);"></td>
            <td style="background-color: rgb(0,0,195);"></td>
            <td style="background-color: rgb(0,0,175);"></td>
            <td style="background-color: rgb(0,0,155);"></td>
            <td style="background-color: rgb(0,0,135);"></td>
            <td style="background-color: rgb(0,0,115);"></td>
        </tr>
        
    </table>
    
</body>
</html>
