<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Password</title>
</head>
<body>
    <button id="button1">Generate Pwd</button>
    <p id="password1">Hello</p>
    <script>
        let btn1=document.getElementById("button1");
        let pass1=document.getElementById("password1");
        let s1="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let s2="abcdefghijklmnopqrstuvwxyz";
        let s3="0123456789";
        let pwd1="";
        
        btn1.onclick=function genPwd(){
            //alert("button clicked");
            let r1=Math.floor(Math.random()*26);
            let r2=Math.floor(Math.random()*26);
            let r3=Math.floor(Math.random()*10);
            pwd1=pwd1+s1.charAt(r1);
            pwd1=pwd1+s2.charAt(r2);
            pwd1=pwd1+s3.charAt(r3);
            pwd1=pwd1+"\n";
            pass1.innerHTML=pwd1;
        }
        
        
    </script>
</body>
</html>
